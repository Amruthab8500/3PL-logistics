# Build the React app and deploy to GitHub Pages.
# Repo: Settings → Pages → Build and deployment → Source: "GitHub Actions"
#
# Optional secrets (repo → Settings → Secrets): set these if the public form should POST
# without pasting the webhook in each browser:
#   REACT_APP_GOOGLE_SHEETS_WEBHOOK_URL
#   REACT_APP_EMAIL_WEBHOOK_URL

name: Deploy GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        env:
          # Project Pages URL: https://<owner>.github.io/<repo>/
          PUBLIC_URL: /${{ github.event.repository.name }}/
          REACT_APP_GOOGLE_SHEETS_WEBHOOK_URL: ${{ secrets.REACT_APP_GOOGLE_SHEETS_WEBHOOK_URL }}
          REACT_APP_EMAIL_WEBHOOK_URL: ${{ secrets.REACT_APP_EMAIL_WEBHOOK_URL }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
